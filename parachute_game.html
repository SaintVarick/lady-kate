<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DROP ZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#04041a; user-select:none; font-family:'Inter',sans-serif; }

/* Two layered canvases */
#bgCanvas, #fgCanvas {
  position:fixed; inset:0;
  width:100vw; height:100vh;
  display:block;
}
#bgCanvas { z-index:1; } /* 2D background + chute + UI drawings */

/* Three.js renderer sits between bg and fg */
#threeCanvas {
  position:fixed; inset:0;
  width:100vw; height:100vh;
  z-index:2;
  pointer-events:none;
}

#fgCanvas { z-index:3; pointer-events:none; } /* nickname tag on top */

/* ── NICKNAME SCREEN ── */
#nickScreen {
  position:fixed; inset:0; z-index:60;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
  background:linear-gradient(180deg,#04041a 0%,#0d1b4b 55%,#1a0d3a 100%);
  transition:opacity .7s, transform .7s;
}
#nickScreen.hide { opacity:0; pointer-events:none; transform:scale(1.05); }

.game-logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,13vw,128px);
  letter-spacing:.06em; line-height:1; text-align:center; color:#fff;
}
.game-logo em {
  display:block; font-style:normal;
  background:linear-gradient(90deg,#ff6b35,#ffd700,#ff6b35);
  background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.nick-label { color:rgba(255,255,255,.5); font-size:13px; letter-spacing:.15em; text-transform:uppercase; }
#nickInput {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2);
  border-radius:14px; padding:14px 22px; font-size:18px; color:#fff; outline:none;
  font-family:'Inter',sans-serif; width:300px; text-align:center;
  transition:border-color .2s, box-shadow .2s;
}
#nickInput::placeholder { color:rgba(255,255,255,.3); }
#nickInput:focus { border-color:#ffd700; box-shadow:0 0 24px rgba(255,215,0,.25); }
.jump-btn {
  padding:16px 60px; background:linear-gradient(135deg,#ff6b35,#ffd700);
  border:none; border-radius:50px; cursor:pointer;
  font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:.12em; color:#04041a;
  box-shadow:0 0 40px rgba(255,107,53,.45); transition:transform .2s, box-shadow .2s;
}
.jump-btn:hover { transform:scale(1.06); box-shadow:0 0 64px rgba(255,215,0,.55); }
.plane-icon-anim { font-size:60px; animation:plane-bob 2.4s ease-in-out infinite; }
@keyframes plane-bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}

/* ── HUD ── */
#hud {
  position:fixed; top:24px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:16px;
  background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.1);
  border-radius:50px; padding:10px 28px; backdrop-filter:blur(14px);
  opacity:0; transition:opacity .4s; pointer-events:none; z-index:20;
}
#hud.show { opacity:1; }
.hud-label { font-size:10px; letter-spacing:.18em; color:rgba(255,255,255,.4); text-transform:uppercase; }
.hud-val { font-family:'Bebas Neue',sans-serif; font-size:30px; color:#ffd700; min-width:56px; text-align:right; }
.hud-unit { font-size:11px; color:rgba(255,255,255,.3); }
.hud-sep { width:1px; height:32px; background:rgba(255,255,255,.1); }

/* ── CONTROLS HINT ── */
#hint {
  position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; opacity:0; transition:opacity .4s; z-index:20; pointer-events:none;
}
#hint.show { opacity:1; }
.key {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18);
  border-radius:10px; padding:8px 16px; font-size:13px; color:#fff;
  backdrop-filter:blur(8px); display:flex; align-items:center; gap:7px;
}

/* ── MUSIC PLAYER ── */
#player {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  z-index:25; display:flex; align-items:center; gap:14px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
  border-radius:50px; padding:10px 20px;
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);
  box-shadow:0 4px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.1);
  min-width:320px; max-width:420px;
  transition:opacity .4s;
}

/* Upload zone (when no file) */
#uploadZone {
  display:flex; align-items:center; gap:10px; cursor:pointer; width:100%;
  justify-content:center;
}
#uploadZone:hover .upload-icon { transform:scale(1.15); }
.upload-icon { font-size:20px; transition:transform .2s; }
.upload-text { font-size:13px; color:rgba(255,255,255,.55); }
#fileInput { display:none; }

/* Player controls (when file loaded) */
#playerControls { display:none; align-items:center; gap:12px; width:100%; }
#playerControls.show { display:flex; }

.play-btn {
  width:34px; height:34px; border-radius:50%;
  background:rgba(255,255,255,.18); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:14px; flex-shrink:0;
  transition:background .18s, transform .15s;
}
.play-btn:hover { background:rgba(255,255,255,.28); transform:scale(1.08); }

.track-info { flex:1; min-width:0; }
.track-name {
  font-size:12px; font-weight:600; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:130px;
}
.track-time { font-size:10px; color:rgba(255,255,255,.4); margin-top:2px; font-variant-numeric:tabular-nums; }

/* Equalizer bars */
#eqCanvas { width:60px; height:28px; flex-shrink:0; }

.vol-btn {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,.5); font-size:14px; flex-shrink:0;
  transition:color .18s;
}
.vol-btn:hover { color:#fff; }

/* ── WIN / WASTED ── */
#winScreen {
  position:fixed; inset:0; z-index:40;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  background:rgba(0,0,0,.6); backdrop-filter:blur(7px);
  opacity:0; pointer-events:none; transition:opacity .6s;
}
#winScreen.show { opacity:1; pointer-events:all; }
.win-title {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(54px,11vw,108px);
  color:#ffd700; letter-spacing:.07em;
  text-shadow:0 0 60px rgba(255,215,0,.9),0 0 120px rgba(255,107,53,.4);
  animation:pulse-win 1.3s ease-in-out infinite;
}
@keyframes pulse-win{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.win-sub { color:rgba(255,255,255,.75); font-size:16px; letter-spacing:.1em; text-transform:uppercase; }

#wastedScreen {
  position:fixed; inset:0; z-index:40;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  opacity:0; pointer-events:none; transition:opacity .35s; background:rgba(0,0,0,0);
}
#wastedScreen.show { opacity:1; pointer-events:all; background:rgba(10,0,0,.6); }
#wastedScreen::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg,transparent 0%,rgba(100,0,0,.35) 45%,rgba(150,0,0,.55) 60%,transparent 100%);
  animation:vscan 1.6s ease-out forwards;
}
@keyframes vscan{0%{transform:translateY(-100%)}100%{transform:translateY(0)}}
.wasted-title {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(66px,15vw,148px);
  color:#cc0000; letter-spacing:.04em;
  text-shadow:3px 3px 0 #000,0 0 50px rgba(220,0,0,.9);
  animation:wasted-pop .42s cubic-bezier(.2,2.2,.4,1) both;
}
@keyframes wasted-pop{0%{transform:scale(2.2) rotate(-4deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.wasted-sub { color:rgba(255,255,255,.55); font-size:14px; letter-spacing:.18em; text-transform:uppercase; }

.replay-btn {
  margin-top:8px; padding:14px 50px;
  background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.22); border-radius:50px;
  font-family:'Bebas Neue',sans-serif; font-size:21px; letter-spacing:.12em;
  color:#fff; cursor:pointer; pointer-events:all;
  backdrop-filter:blur(8px); transition:background .2s, transform .2s;
}
.replay-btn:hover { background:rgba(255,255,255,.2); transform:scale(1.05); }

/* 3D model info tooltip */
#modelTip {
  position:fixed; bottom:80px; right:20px; z-index:25;
  background:rgba(0,0,0,.55); border:1px solid rgba(255,215,0,.3);
  border-radius:12px; padding:10px 14px; max-width:220px;
  font-size:11px; color:rgba(255,255,255,.6); line-height:1.5;
  backdrop-filter:blur(10px);
}
#modelTip strong { color:#ffd700; display:block; margin-bottom:4px; font-size:12px; }
#modelTip code { background:rgba(255,255,255,.1); border-radius:4px; padding:1px 5px; font-size:10px; color:#adf; }
</style>
</head>
<body>

<!-- NICKNAME SCREEN -->
<div id="nickScreen">
  <div class="plane-icon-anim">✈️</div>
  <div class="game-logo">DROP<em>ZONE</em></div>
  <div class="nick-label">Enter your callsign</div>
  <input id="nickInput" type="text" maxlength="16" placeholder="PLAYER_1" autocomplete="off" />
  <button class="jump-btn" onclick="beginGame()">▶ BOARD THE PLANE</button>
</div>

<!-- BG CANVAS — sky, plane, chute, checkpoint, HUD drawings -->
<canvas id="bgCanvas"></canvas>

<!-- THREE.JS CANVAS — 3D model -->
<canvas id="threeCanvas"></canvas>

<!-- FG CANVAS — nickname tag -->
<canvas id="fgCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <span class="hud-label">ALT</span>
  <span class="hud-val" id="altVal">0</span>
  <span class="hud-unit">m</span>
  <div class="hud-sep"></div>
  <span class="hud-label">SPD</span>
  <span class="hud-val" id="spdVal">0</span>
  <span class="hud-unit">km/h</span>
</div>

<!-- CONTROLS HINT -->
<div id="hint">
  <div class="key">← → Steer</div>
  <div class="key">SPACE — Open Chute</div>
</div>

<!-- MUSIC PLAYER -->
<div id="player">
  <div id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <span class="upload-icon">🎵</span>
    <span class="upload-text">Drop your music here</span>
  </div>
  <input type="file" id="fileInput" accept="audio/*" />
  <div id="playerControls">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="track-info">
      <div class="track-name" id="trackName">—</div>
      <div class="track-time" id="trackTime">0:00 / 0:00</div>
    </div>
    <canvas id="eqCanvas"></canvas>
    <button class="vol-btn" onclick="toggleMute()" id="volBtn">🔊</button>
  </div>
</div>
<audio id="bgMusic" loop>
    <source src="ed.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

document.addEventListener("click", function startMusic() {
    music.play();
    document.removeEventListener("click", startMusic);
}, { once: true });
</script>

<!-- WIN / WASTED -->
<div id="winScreen">
  <div class="win-title">🎯 PERFECT LANDING!</div>
  <div class="win-sub">Drop zone secured</div>
  <button class="replay-btn" onclick="restartFull()">↩ JUMP AGAIN</button>
</div>
<div id="wastedScreen">
  <div class="wasted-title">WASTED</div>
  <div class="wasted-sub">You missed the landing zone</div>
  <button class="replay-btn" onclick="restartFull()">↩ TRY AGAIN</button>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ════════════════════════════════════════════════
//  CONFIG — change this to your .glb path
// ════════════════════════════════════════════════
const MODEL_PATH = 'hawaiian.glb'; // <-- put your .glb file next to the html

// ════════════════════════════════════════════════
//  BG CANVAS (2D)
// ════════════════════════════════════════════════
const bgCanvas = document.getElementById('bgCanvas');
const ctx      = bgCanvas.getContext('2d');
const fgCanvas = document.getElementById('fgCanvas');
const fgCtx    = fgCanvas.getContext('2d');
let W, H;

function resize(){
  W = bgCanvas.width = fgCanvas.width = window.innerWidth;
  H = bgCanvas.height= fgCanvas.height= window.innerHeight;
  if(threeRenderer) threeRenderer.setSize(W, H);
  if(threeCamera)   { threeCamera.aspect=W/H; threeCamera.updateProjectionMatrix(); }
}
window.addEventListener('resize', resize);

// ════════════════════════════════════════════════
//  THREE.JS SETUP
// ════════════════════════════════════════════════
const threeCanvas   = document.getElementById('threeCanvas');
let threeRenderer, threeScene, threeCamera;
let model3D = null, mixer3D = null;
let modelLoaded = false;
let fallbackMesh = null; // simple shape if no model

function initThree(){
  threeRenderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
  threeRenderer.setPixelRatio(window.devicePixelRatio);
  threeRenderer.setSize(window.innerWidth, window.innerHeight);
  threeRenderer.setClearColor(0x000000, 0);

  threeScene = new THREE.Scene();

  threeCamera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  threeCamera.position.set(0, 0, 5);

  // Lights
  const amb = new THREE.AmbientLight(0xffffff, 0.7);
  threeScene.add(amb);
  const dir = new THREE.DirectionalLight(0xffd700, 1.2);
  dir.position.set(3, 8, 5);
  threeScene.add(dir);
  const rim = new THREE.DirectionalLight(0x4488ff, 0.4);
  rim.position.set(-4, 2, -3);
  threeScene.add(rim);

  // Try to load GLB model
  loadModel();

  resize();
}

function loadModel(){
  // GLTFLoader is not in r128 core — load it from CDN
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const loader = new THREE.GLTFLoader();
    loader.load(
      MODEL_PATH,
      (gltf) => {
        model3D = gltf.scene;
        // Auto-scale to fit nicely
        const box = new THREE.Box3().setFromObject(model3D);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.8 / maxDim;
        model3D.scale.setScalar(scale);
        // Centre
        const center = box.getCenter(new THREE.Vector3());
        model3D.position.sub(center.multiplyScalar(scale));

        threeScene.add(model3D);
        modelLoaded = true;

        // Animations
        if(gltf.animations && gltf.animations.length){
          mixer3D = new THREE.AnimationMixer(model3D);
          const clip = THREE.AnimationClip.findByName(gltf.animations, 'fall')
                    || gltf.animations[0];
          mixer3D.clipAction(clip).play();
        }

        // Hide tip
        document.getElementById('modelTip').style.display='none';
      },
      undefined,
      () => {
        // No model found — use fallback capsule
        useFallbackModel();
      }
    );
  };
  script.onerror = () => useFallbackModel();
  document.head.appendChild(script);
}

function useFallbackModel(){
  // Fallback: simple humanoid shape
  const group = new THREE.Group();

  const bodyGeo  = new THREE.CylinderGeometry(.22,.28,.65,16);
  const headGeo  = new THREE.SphereGeometry(.22,16,16);
  const helmetGeo= new THREE.SphereGeometry(.24,16,16);
  const mat      = new THREE.MeshPhongMaterial({ color: 0x3a5f8a });
  const skinMat  = new THREE.MeshPhongMaterial({ color: 0xf0c87a });
  const helmMat  = new THREE.MeshPhongMaterial({ color: 0xff6b35 });

  const body = new THREE.Mesh(bodyGeo, mat);
  body.position.y = 0;
  group.add(body);

  const head = new THREE.Mesh(headGeo, skinMat);
  head.position.y = .58;
  group.add(head);

  const helmet = new THREE.Mesh(helmetGeo, helmMat);
  helmet.position.y = .62;
  helmet.scale.y = .6;
  group.add(helmet);

  // Arms
  const armGeo = new THREE.CylinderGeometry(.07,.07,.4,8);
  const lArm   = new THREE.Mesh(armGeo, mat);
  lArm.position.set(-.38,.1,0); lArm.rotation.z = Math.PI/2.5;
  group.add(lArm);
  const rArm   = new THREE.Mesh(armGeo, mat);
  rArm.position.set(.38,.1,0); rArm.rotation.z = -Math.PI/2.5;
  group.add(rArm);

  // Legs
  const legGeo = new THREE.CylinderGeometry(.09,.07,.45,8);
  const lLeg   = new THREE.Mesh(legGeo, mat);
  lLeg.position.set(-.16,-.5,0);
  group.add(lLeg);
  const rLeg   = new THREE.Mesh(legGeo, mat);
  rLeg.position.set(.16,-.5,0);
  group.add(rLeg);

  model3D = group;
  fallbackMesh = group;
  threeScene.add(model3D);
  modelLoaded = true;

  // Show tip
  document.getElementById('modelTip').style.display='block';
}

// ════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════
let phase      = 'cabin';
let nickname   = 'PLAYER';
let frameCount = 0;

let px, py, vx, vy;
let chuteOpen  = false;
let chuteScale = 0;

let cabinTimer = 0;
const CABIN_DUR = 180;
let jumpAnimT  = 0;
const JUMP_DUR = 90;
let planeX, planeY;
let playerStartX, playerStartY;

let groundY, checkX, checkW;
let wind = 0;
let clouds=[], stars=[], bgMountains=[];
let particles=[];

const keys={};
document.addEventListener('keydown',e=>{ keys[e.code]=true; e.code==='Space'&&e.preventDefault(); });
document.addEventListener('keyup',  e=>{ keys[e.code]=false; });
document.getElementById('nickInput').addEventListener('keydown',e=>{ if(e.key==='Enter') beginGame(); });

// ════════════════════════════════════════════════
//  INIT WORLD
// ════════════════════════════════════════════════
function initWorld(){
  groundY  = H - 110;
  checkW   = 120;
  checkX   = W*.25 + Math.random()*W*.5;
  wind     = (Math.random()-.5)*.18;
  chuteOpen= false; chuteScale=0;
  vx=vy=0; particles=[];
  planeX=-160; planeY=H*.12;
  px=planeX+40; py=planeY+10;

  clouds=Array.from({length:9},()=>({
    x:Math.random()*W, y:H*.04+Math.random()*H*.38,
    w:110+Math.random()*200, h:35+Math.random()*55,
    spd:.12+Math.random()*.22, layer:Math.random()>.5?1:2
  }));
  stars=Array.from({length:90},()=>({
    x:Math.random()*W, y:Math.random()*H*.52,
    r:Math.random()*1.5+.3, ph:Math.random()*Math.PI*2
  }));
  bgMountains=[];
  for(let layer=0;layer<2;layer++){
    let pts=[{x:0,y:groundY}]; let x=0;
    while(x<W+200){ x+=60+Math.random()*120; pts.push({x,y:layer===0?groundY-80-Math.random()*200:groundY-30-Math.random()*100}); }
    pts.push({x:W+200,y:groundY});
    bgMountains.push({pts,layer});
  }
}

// ════════════════════════════════════════════════
//  START / RESTART
// ════════════════════════════════════════════════
function beginGame(){
  let n=document.getElementById('nickInput').value.trim();
  nickname=n||'PLAYER_1';
  document.getElementById('nickScreen').classList.add('hide');
  initWorld();
  phase='cabin'; cabinTimer=0; frameCount=0;
  loop();
}
function restartFull(){
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('wastedScreen').classList.remove('show');
  document.getElementById('hud').classList.remove('show');
  document.getElementById('hint').classList.remove('show');
  initWorld(); phase='cabin'; cabinTimer=0; frameCount=0;
}

// ════════════════════════════════════════════════
//  PHYSICS
// ════════════════════════════════════════════════
const GRAV_FREE=.09, GRAV_CHUTE=.018, DRAG_FREE=.998, DRAG_CHUTE=.96;
const MOVE_F=.18, VX_MAX=2.2, VY_MAX_FREE=3.5, VY_MAX_CHUTE=1.0;
let clock3D = { last: 0 };

function update(ts){
  frameCount++;
  let dt = Math.min((ts - clock3D.last) / 1000, .05);
  clock3D.last = ts;
  if(mixer3D) mixer3D.update(dt);

  if(phase==='cabin'){
    cabinTimer++;
    planeX+=1.1; px=planeX+40; py=planeY+16+Math.sin(frameCount*.06)*5;
    if(cabinTimer>=CABIN_DUR){
      playerStartX=px; playerStartY=py;
      phase='jump_anim'; jumpAnimT=0;
      document.getElementById('hud').classList.add('show');
      document.getElementById('hint').classList.add('show');
    }
    syncModel3D();
    return;
  }
  if(phase==='jump_anim'){
    jumpAnimT++;
    let t=jumpAnimT/JUMP_DUR;
    px=playerStartX+t*80; py=playerStartY+t*t*180-t*40;
    if(jumpAnimT>=JUMP_DUR){ vx=.6; vy=.3; phase='freefall'; }
    syncModel3D(); return;
  }
  if(phase==='freefall'||phase==='chute'){
    if(!chuteOpen&&(keys['Space']||keys['ArrowUp'])){ chuteOpen=true; phase='chute'; vy*=.4; }
    if(chuteOpen&&chuteScale<1) chuteScale=Math.min(1,chuteScale+.045);
    if(keys['ArrowLeft']||keys['KeyA']) vx-=MOVE_F;
    if(keys['ArrowRight']||keys['KeyD']) vx+=MOVE_F;
    vx+=wind;
    vy+=chuteOpen?GRAV_CHUTE:GRAV_FREE;
    vx*=chuteOpen?DRAG_CHUTE:DRAG_FREE;
    vy*=chuteOpen?DRAG_CHUTE:DRAG_FREE;
    vx=Math.max(-VX_MAX,Math.min(VX_MAX,vx));
    vy=Math.min(chuteOpen?VY_MAX_CHUTE:VY_MAX_FREE,vy);
    px+=vx; py+=vy;
    if(px<24){px=24;vx=Math.abs(vx)*.3;}
    if(px>W-24){px=W-24;vx=-Math.abs(vx)*.3;}
    if(py>=groundY-30){
      py=groundY-30; vx=0; vy=0;
      let inZone=px>checkX-checkW/2&&px<checkX+checkW/2;
      if(inZone){phase='landed';triggerWin();}
      else{phase='wasted';triggerWasted();}
      document.getElementById('hint').classList.remove('show');
    }
  }
  syncModel3D();

  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.09; p.vx*=.985; p.life--; p.alpha=p.life/p.maxLife;
  });
  particles=particles.filter(p=>p.life>0);
  clouds.forEach(c=>{ c.x+=c.spd*(c.layer===1?.5:1); if(c.x>W+150)c.x=-200; });

  let alt=Math.max(0,Math.round((groundY-py)*.6));
  let spd=Math.round(Math.sqrt(vx*vx+vy*vy)*28);
  document.getElementById('altVal').textContent=alt;
  document.getElementById('spdVal').textContent=spd;
}

// Map 2D canvas px,py → Three.js world coords
function syncModel3D(){
  if(!model3D) return;
  // Convert px,py (pixels) to NDC then to camera space
  let ndcX = (px/W)*2 - 1;
  let ndcY = -((py/H)*2 - 1);
  // Project onto a plane at z=0 in world space
  let vec = new THREE.Vector3(ndcX, ndcY, 0.5);
  vec.unproject(threeCamera);
  let dir = vec.sub(threeCamera.position).normalize();
  let dist = -threeCamera.position.z / dir.z;
  let worldPos = threeCamera.position.clone().add(dir.multiplyScalar(dist));

  model3D.position.set(worldPos.x, worldPos.y, 0);

  // Rotation: wobble in freefall, upright with chute
  let wobble = phase==='freefall' ? Math.sin(frameCount*.15)*.15 : 0;
  model3D.rotation.z = wobble;
  model3D.rotation.y = frameCount*.005; // slow spin to show model

  // Scale: normal size
  let s = modelLoaded ? 1 : 1;
  model3D.scale.setScalar(s * (fallbackMesh ? .55 : 1));
}

// ════════════════════════════════════════════════
//  DRAW 2D (bg canvas)
// ════════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#02021a'); sky.addColorStop(.38,'#0c1a4a');
  sky.addColorStop(.72,'#1a0d38'); sky.addColorStop(1,'#3a0c0c');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    s.ph+=.008;
    let a=.3+.6*Math.abs(Math.sin(s.ph));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
  });

  // Glow
  const glow=ctx.createLinearGradient(0,H*.55,0,H);
  glow.addColorStop(0,'transparent'); glow.addColorStop(.5,'rgba(255,100,50,.07)'); glow.addColorStop(1,'rgba(255,80,30,.17)');
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

  // Mountains
  bgMountains.forEach((m,mi)=>{
    ctx.beginPath(); ctx.moveTo(m.pts[0].x,m.pts[0].y);
    m.pts.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.closePath();
    ctx.fillStyle=mi===0?'rgba(12,24,48,.9)':'rgba(8,16,32,.7)'; ctx.fill();
  });

  // Ground
  const grd=ctx.createLinearGradient(0,groundY,0,H);
  grd.addColorStop(0,'#1a3e18'); grd.addColorStop(.4,'#0d2010'); grd.addColorStop(1,'#05100a');
  ctx.fillStyle=grd; ctx.fillRect(0,groundY,W,H-groundY);
  ctx.save(); ctx.shadowColor='#2a6020'; ctx.shadowBlur=22;
  ctx.fillStyle='#2a6020'; ctx.fillRect(0,groundY-2,W,3); ctx.restore();

  clouds.forEach(drawCloud);
  drawCheckpoint();

  if(phase==='cabin') drawCabinScene();
  if(phase==='jump_anim') drawPlane(planeX+1.1*jumpAnimT, planeY);

  // Chute drawn on 2D canvas OVER the Three.js model
  if(chuteOpen && (phase==='chute'||phase==='landed'||phase==='wasted')){
    drawChuteOnly();
  }

  // Fireworks
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=12; ctx.fill();
    ctx.restore();
  });

  drawWindHUD();
}

// Draw ONLY the parachute canopy (model body rendered in Three.js)
function drawChuteOnly(){
  let s=chuteScale;
  let cW=90*s, cH=50*s;
  let cx=px, cy=py;

  ctx.save();
  ctx.shadowColor='rgba(255,215,0,.55)'; ctx.shadowBlur=24;
  const canopy=ctx.createRadialGradient(cx,cy-cH-38,4,cx,cy-cH-38,cW*.75);
  canopy.addColorStop(0,'#ffd700'); canopy.addColorStop(.45,'#ff6b35'); canopy.addColorStop(1,'#c0392b');
  ctx.fillStyle=canopy;
  ctx.beginPath();
  ctx.moveTo(cx-cW*.5,cy-cH-18);
  ctx.quadraticCurveTo(cx,cy-cH-72*s,cx+cW*.5,cy-cH-18);
  ctx.quadraticCurveTo(cx+cW*.38,cy-14*s,cx,cy-10*s);
  ctx.quadraticCurveTo(cx-cW*.38,cy-14*s,cx-cW*.5,cy-cH-18);
  ctx.fill();

  // Panels
  ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1;
  for(let i=-2;i<=2;i++){
    ctx.beginPath(); ctx.moveTo(cx,cy-10*s); ctx.lineTo(cx+i*(cW/5),cy-cH-36*s); ctx.stroke();
  }
  // Ropes to model shoulders
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(cx-12,cy-8); ctx.lineTo(cx-cW*.38,cy-14*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+12,cy-8); ctx.lineTo(cx+cW*.38,cy-14*s); ctx.stroke();
  ctx.restore();
}

// FG canvas — nickname tag
function drawFG(){
  fgCtx.clearRect(0,0,W,H);
  if(phase==='freefall'||phase==='chute'||phase==='jump_anim'||phase==='landed'||phase==='wasted'){
    drawNickname();
  }
}

function drawNickname(){
  let tagY = py - 58 - (chuteOpen ? 72*chuteScale : 0);
  fgCtx.font='700 13px Inter';
  fgCtx.textAlign='center'; fgCtx.textBaseline='middle';
  let tw=fgCtx.measureText(nickname).width;
  let pad=10, ph=22, r=7;
  let bx=px-tw/2-pad, by=tagY-ph/2;
  fgCtx.fillStyle='rgba(0,0,0,.7)';
  fgCtx.strokeStyle='rgba(255,215,0,.65)'; fgCtx.lineWidth=1;
  roundRectCtx(fgCtx,bx,by,tw+pad*2,ph,r); fgCtx.fill();
  roundRectCtx(fgCtx,bx,by,tw+pad*2,ph,r); fgCtx.stroke();
  fgCtx.fillStyle='#ffd700'; fgCtx.fillText(nickname,px,tagY);
}

function roundRectCtx(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

function drawCabinScene(){
  ctx.save();
  const vig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.8);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,.75)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H); ctx.restore();
  drawPlane(planeX,planeY);
  let progress=cabinTimer/CABIN_DUR;
  let barW=260,barH=8,bx=W/2-barW/2,by=H*.88;
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,.1)'; roundRectCtx(ctx,bx,by,barW,barH,4); ctx.fill();
  let fillW=barW*progress;
  const bg=ctx.createLinearGradient(bx,by,bx+barW,by);
  bg.addColorStop(0,'#ff6b35'); bg.addColorStop(1,'#ffd700');
  ctx.fillStyle=bg;
  if(fillW>4){roundRectCtx(ctx,bx,by,fillW,barH,4); ctx.fill();}
  ctx.font='600 12px Inter'; ctx.fillStyle='rgba(255,255,255,.5)'; ctx.textAlign='center';
  ctx.fillText('PREPARING TO JUMP...',W/2,by-12);
  if(progress>.78&&Math.floor(frameCount/18)%2===0){
    ctx.font='700 22px "Bebas Neue",sans-serif'; ctx.fillStyle='#ffd700';
    ctx.fillText('GET READY!',W/2,by-36);
  }
  ctx.restore();
}

function drawPlane(x,y){
  ctx.save(); ctx.translate(x,y+Math.sin(frameCount*.05)*4);
  ctx.fillStyle='#b0c4d8';
  ctx.beginPath(); ctx.moveTo(-80,0); ctx.quadraticCurveTo(-60,-22,0,-20); ctx.quadraticCurveTo(60,-18,80,0); ctx.quadraticCurveTo(60,18,0,18); ctx.quadraticCurveTo(-60,18,-80,0); ctx.fill();
  ctx.fillStyle='rgba(100,180,255,.6)'; ctx.beginPath(); ctx.ellipse(62,-6,18,10,-.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8aaec4'; ctx.beginPath(); ctx.moveTo(-10,-18); ctx.lineTo(-60,-55); ctx.lineTo(-80,-48); ctx.lineTo(-20,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#a0c0d6'; ctx.beginPath(); ctx.moveTo(-10,18); ctx.lineTo(-60,52); ctx.lineTo(-80,46); ctx.lineTo(-20,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#8aaec4'; ctx.beginPath(); ctx.moveTo(-80,0); ctx.lineTo(-100,-30); ctx.lineTo(-88,-2); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#7090a8'; ctx.beginPath(); ctx.ellipse(-30,-22,18,7,-.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(160,220,255,.45)';
  for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(-50+i*18,-16,5,4,0,0,Math.PI*2);ctx.fill();}
  if(phase==='cabin'){
    ctx.strokeStyle='rgba(255,200,100,.7)'; ctx.lineWidth=2; ctx.strokeRect(-15,-16,22,32);
    if(cabinTimer>40){ctx.fillStyle='#f5d5a0';ctx.beginPath();ctx.arc(0,-10,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e8c97a';ctx.fillRect(-6,-4,12,16);}
  }
  ctx.restore();
}

function drawCloud(c){
  ctx.save(); ctx.globalAlpha=.14+(c.layer===2?.1:0); ctx.fillStyle='#cce0f5';
  ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w*.5,c.h*.38,0,0,Math.PI*2);
  ctx.ellipse(c.x+c.w*.22,c.y-c.h*.22,c.w*.3,c.h*.48,0,0,Math.PI*2);
  ctx.ellipse(c.x-c.w*.2,c.y-c.h*.1,c.w*.27,c.h*.36,0,0,Math.PI*2);
  ctx.fill(); ctx.restore();
}

function drawCheckpoint(){
  const x=checkX,y=groundY,w=checkW,h=34;
  let pulse=.5+.5*Math.sin(Date.now()*.0035);
  ctx.save(); ctx.shadowColor='#00ff88'; ctx.shadowBlur=32;
  const padG=ctx.createLinearGradient(x-w/2,y-h,x+w/2,y);
  padG.addColorStop(0,'rgba(0,255,136,.22)'); padG.addColorStop(1,'rgba(0,180,90,.05)');
  ctx.fillStyle=padG; ctx.fillRect(x-w/2,y-h,w,h);
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=2; ctx.strokeRect(x-w/2,y-h,w,h);
  ctx.strokeStyle='rgba(0,255,136,.8)'; ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(x-18,y-h/2-12);ctx.lineTo(x+18,y-h/2+12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+18,y-h/2-12);ctx.lineTo(x-18,y-h/2+12);ctx.stroke();
  ctx.globalAlpha=pulse*.45; ctx.strokeStyle='#00ff88'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(x,y-h/2,w*.45+pulse*12,h*.65+pulse*5,0,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1; ctx.fillStyle='#00ff88';
  [[x-w/2,y-h],[x+w/2,y-h],[x-w/2,y],[x+w/2,y]].forEach(([cx,cy])=>ctx.fillRect(cx-3,cy-3,6,6));
  ctx.restore();
  ctx.save(); ctx.font='700 11px Inter'; ctx.textAlign='center';
  ctx.fillStyle='rgba(0,255,136,.9)'; ctx.fillText('▼ LANDING ZONE ▼',x,y-h-10); ctx.restore();
}

function drawWindHUD(){
  if(phase==='cabin') return;
  ctx.save(); ctx.font='600 12px Inter'; ctx.fillStyle='rgba(255,255,255,.35)'; ctx.textAlign='right';
  ctx.fillText(`WIND ${wind>0?'→':'←'} ${Math.abs(wind).toFixed(2)}`,W-22,42); ctx.restore();
}

// ════════════════════════════════════════════════
//  FIREWORKS
// ════════════════════════════════════════════════
const FW=['#ffd700','#ff6b35','#00ff88','#ff3399','#55ccff','#fff','#ffaa00','#cc44ff'];
function burst(x,y){
  let n=55+Math.random()*45;
  for(let i=0;i<n;i++){
    let a=(Math.PI*2/n)*i+Math.random()*.4, s=2+Math.random()*5.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,size:1.8+Math.random()*2.8,color:FW[~~(Math.random()*FW.length)],life:55+Math.random()*45,maxLife:100,alpha:1});
  }
}
let fwInt=null;
function triggerWin(){
  fwInt=setInterval(()=>burst(W*.2+Math.random()*W*.6,H*.1+Math.random()*H*.5),280);
  setTimeout(()=>{ clearInterval(fwInt); document.getElementById('winScreen').classList.add('show'); },2800);
}
function triggerWasted(){
  setTimeout(()=>document.getElementById('wastedScreen').classList.add('show'),700);
}

// ════════════════════════════════════════════════
//  MUSIC PLAYER + EQUALIZER
// ════════════════════════════════════════════════
let audioCtx, analyser, audioSrc, audioEl;
let isPlaying=false, isMuted=false;
let eqBars=Array(18).fill(0);

const eqCanvas=document.getElementById('eqCanvas');
const eqCtx=eqCanvas.getContext('2d');
eqCanvas.width=120; eqCanvas.height=56;

document.getElementById('fileInput').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const url=URL.createObjectURL(file);
  if(!audioEl){ audioEl=new Audio(); audioEl.crossOrigin='anonymous'; }
  else { audioEl.pause(); }
  audioEl.src=url;
  document.getElementById('trackName').textContent=file.name.replace(/\.[^.]+$/,'');

  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=64;
    audioSrc=audioCtx.createMediaElementSource(audioEl);
    audioSrc.connect(analyser); analyser.connect(audioCtx.destination);
  }

  audioEl.addEventListener('timeupdate',updateTime);
  audioEl.addEventListener('ended',()=>{ isPlaying=false; document.getElementById('playBtn').textContent='▶'; });
  document.getElementById('uploadZone').style.display='none';
  document.getElementById('playerControls').classList.add('show');
  audioEl.play(); isPlaying=true; document.getElementById('playBtn').textContent='⏸';
});

function togglePlay(){
  if(!audioEl) return;
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
  if(isPlaying){ audioEl.pause(); document.getElementById('playBtn').textContent='▶'; }
  else { audioEl.play(); document.getElementById('playBtn').textContent='⏸'; }
  isPlaying=!isPlaying;
}
function toggleMute(){
  if(!audioEl) return;
  isMuted=!isMuted; audioEl.muted=isMuted;
  document.getElementById('volBtn').textContent=isMuted?'🔇':'🔊';
}
function updateTime(){
  let c=audioEl.currentTime, d=audioEl.duration||0;
  document.getElementById('trackTime').textContent=`${fmt(c)} / ${fmt(d)}`;
}
function fmt(s){ let m=~~(s/60),ss=~~(s%60); return `${m}:${ss.toString().padStart(2,'0')}`; }

function drawEQ(){
  eqCtx.clearRect(0,0,eqCanvas.width,eqCanvas.height);
  let data;
  if(analyser){
    let buf=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buf);
    // Sample down to eqBars.length
    let step=Math.floor(buf.length/eqBars.length);
    for(let i=0;i<eqBars.length;i++){
      let val=buf[i*step]/255;
      eqBars[i]+=(val-eqBars[i])*.25;
    }
  } else {
    // idle animation when no audio
    for(let i=0;i<eqBars.length;i++){
      eqBars[i]=.08+Math.abs(Math.sin(Date.now()*.002+i*.7))*.08;
    }
  }

  let bW=eqCanvas.width/eqBars.length;
  let gap=2;
  eqBars.forEach((v,i)=>{
    let h=Math.max(3,v*eqCanvas.height*.85);
    let x=i*bW+gap*.5;
    let y=eqCanvas.height-h;

    // Gradient bar
    const g=eqCtx.createLinearGradient(0,y,0,eqCanvas.height);
    if(v>.7){ g.addColorStop(0,'#ff6b35'); g.addColorStop(1,'#ffd700'); }
    else     { g.addColorStop(0,'rgba(255,255,255,.9)'); g.addColorStop(1,'rgba(255,255,255,.35)'); }
    eqCtx.fillStyle=g;
    eqCtx.beginPath();
    eqCtx.roundRect ? eqCtx.roundRect(x,y,bW-gap,h,2) : eqCtx.rect(x,y,bW-gap,h);
    eqCtx.fill();
  });
}

// ════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════
let rafId;
function loop(ts=0){
  update(ts);
  draw();
  drawFG();
  if(threeRenderer && threeScene && threeCamera){
    threeRenderer.render(threeScene, threeCamera);
  }
  drawEQ();
  rafId=requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
resize();
initThree();
// Draw idle EQ before game starts
setInterval(drawEQ, 50);
</script>
